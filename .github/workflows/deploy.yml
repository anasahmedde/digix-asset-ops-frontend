name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/digix/frontend

            # Pull latest code
            git fetch origin main
            git reset --hard origin/main

            # Rebuild and restart
            cd /opt/digix
            docker compose -f docker-compose.prod.yml --env-file .env.prod build frontend
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d frontend

            # Restart nginx to pick up any changes
            docker compose -f docker-compose.prod.yml --env-file .env.prod restart nginx

            echo "Frontend deployed successfully!"
